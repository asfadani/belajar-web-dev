<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 h-screen flex items-center justify-center font-sans">
    <form class="bg-gray-300 p-8 rounded-xl shadow-lg w-80">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">Login</h1>
        <div class="mb-4">
            <label for="Username" class="block text-sm font-medium text-gray-700 mb-2">Username :</label>
            <input type="text" id="Username" name="Username" placeholder="Masukkan Username.."
                class="w-full border border-gray-300 shadow-md px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-white-400" />
        </div>

        <div class="mb-6">
            <label for="pass" class="block text-sm font-medium text-gray-700 mb-2">Password :</label>

            <div class="relative">
                <input type="password" id="pass" name="password" placeholder="Masukkan Password.." required
                    class="w-full border border-gray-300 px-3 py-2 shadow-md rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-400 pr-10" />

                <button type="button" id="lihatPass"
                    class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </button>
            </div>
        </div>


        <button type="submit"
            class="w-full bg-gray-400 text-white font-bold py-2 px-4 rounded-lg hover:bg-gray-600 transition duration-300">
            <span>Masuk</span>
        </button>
    </form>

    <script src="belajar.js"></script>
</body>

</html>
