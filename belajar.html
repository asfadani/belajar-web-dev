<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 h-screen flex items-center justify-center font-sans">
    <form class="bg-gray-300 p-8 rounded-xl shadow-lg w-80">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">Login</h1>
        <div class="mb-4">
            <label for="Username" class="block text-sm font-medium text-gray-700 mb-2">Username :</label>
            <input type="text" id="Username" name="Username" placeholder="Masukkan Username.."
                class="w-full border border-gray-300 shadow-md px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-white-400" />
        </div>

        <div class="mb-6">
            <label for="pass" class="block text-sm font-medium text-gray-700 mb-2">Password :</label>
            <input type="password" id="pass" name="password" placeholder="Masukkan Password.." required
                class="w-full border border-gray-300 px-3 py-2 shadow-md rounded-lg focus:outline-none focus:ring-2 focus:ring-white-400" />
        </div>

        <button type="submit"
            class="w-full bg-gray-400 text-white font-bold py-2 px-4 rounded-lg hover:bg-gray-600 transition duration-300">
            <span>Masuk</span>
        </button>
    </form>
</body>

</html>
